groups:
  - name: multi_region_alerts
    rules:
      # High Cross-Region Sync Latency
      - alert: HighSyncLatency
        expr: histogram_quantile(0.99, rate(sync_latency_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          component: sync
        annotations:
          summary: "Cross-region sync latency too high"
          description: "P99 sync latency is {{ $value }}s, exceeding 500ms threshold"

      # High Conflict Rate
      - alert: HighConflictRate
        expr: rate(conflict_total[5m]) > 0.001
        for: 2m
        labels:
          severity: critical
          component: conflict_resolution
        annotations:
          summary: "Message conflict rate too high"
          description: "Conflict rate is {{ $value }}/s, exceeding 0.1% threshold"

      # Failover Event Detection
      - alert: FailoverEvent
        expr: increase(failover_events_total[1m]) > 0
        labels:
          severity: critical
          component: failover
        annotations:
          summary: "Failover event detected"
          description: "A failover event has been triggered in the multi-region setup"

      # Service Health Check Failure
      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} in {{ $labels.region }} has been down for more than 30 seconds"

      # HLC Clock Drift
      - alert: HLCClockDrift
        expr: abs(hlc_physical_time_ms - time() * 1000) > 5000
        for: 1m
        labels:
          severity: warning
          component: hlc
        annotations:
          summary: "HLC clock drift detected"
          description: "HLC physical time differs from system time by {{ $value }}ms in {{ $labels.region }}"

      # Cross-Region Network Issues
      - alert: CrossRegionNetworkIssue
        expr: rate(cross_region_network_errors_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
          component: network
        annotations:
          summary: "Cross-region network errors detected"
          description: "Network error rate between regions is {{ $value }}/s"

      # Message Queue Lag
      - alert: MessageQueueLag
        expr: kafka_consumer_lag_sum > 1000
        for: 5m
        labels:
          severity: warning
          component: messaging
        annotations:
          summary: "Message queue lag is high"
          description: "Kafka consumer lag is {{ $value }} messages"

      # Database Connection Issues
      - alert: DatabaseConnectionIssue
        expr: database_connections_active / database_connections_max > 0.8
        for: 2m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connection usage is {{ $value }}% in {{ $labels.region }}"