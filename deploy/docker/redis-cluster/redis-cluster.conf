# Redis Cluster 配置文件
# 适用于三主三从部署模式

# ===== 基础配置 =====

# 绑定所有网络接口
bind 0.0.0.0

# Redis 端口
port 6379

# 以守护进程模式运行
daemonize no

# 日志配置
loglevel notice
logfile ""

# 数据库数量（Cluster 模式下固定为 1）
databases 1

# ===== Cluster 配置 =====

# 启用 Cluster 模式
cluster-enabled yes

# Cluster 配置文件（节点状态和槽位信息）
cluster-config-file nodes.conf

# 节点超时时间（毫秒）
# 超过此时间未通信的节点将被标记为 PFAIL/FAIL
cluster-node-timeout 5000

# 集群中最少主节点数量，低于此值集群将不可写
# 设置为 1 表示只要有 1 个主节点可用，集群就可以写
cluster-require-full-coverage no

# 允许从节点在特定条件下提升为主节点
cluster-replica-validity-factor 10

# 从节点是否可以接受写入（默认关闭）
cluster-replica-no-failover no

# ===== 持久化配置 =====

# 启用 RDB 持久化
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 工作目录
dir /data

# 启用 AOF 持久化
appendonly yes
appendfilename "appendonly.aof"

# AOF 同步策略：每秒同步一次（推荐）
appendfsync everysec

# 重写 AOF 文件的触发条件
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 启用 RDB-AOF 混合持久化
aof-use-rdb-preamble yes

# ===== 内存管理 =====

# 最大内存限制（512MB）
maxmemory 512mb

# 内存淘汰策略：所有键中随机淘汰（适合缓存场景）
# 如需强一致性，可改为 noeviction（不淘汰，直接返回错误）
maxmemory-policy allkeys-lru

# ===== 网络配置 =====

# TCP 连接 backlog
tcp-backlog 511

# 客户端超时（0 表示不超时）
timeout 0

# TCP keepalive
tcp-keepalive 300

# 保护模式（生产环境建议开启）
protected-mode no

# ===== 安全配置 =====

# 密码认证（可选，生产环境建议启用）
# requirepass your_secure_password

# 重命名危险命令（可选）
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""
# rename-command CONFIG ""

# ===== 性能优化 =====

# 最大客户端连接数
maxclients 10000

# 慢查询日志阈值（微秒）
slowlog-log-slower-than 10000
slowlog-max-len 128

# 延迟监控阈值（毫秒）
latency-monitor-threshold 100

# ===== 其他配置 =====

# 是否启用 stop-writes-on-bgsave-error
stop-writes-on-bgsave-error yes

# RDB 压缩
rdbcompression yes

# RDB 校验和
rdbchecksum yes

# 从节点只读
replica-read-only yes

# 复制磁盘同步
repl-diskless-sync no

# Lua 脚本超时（毫秒）
lua-time-limit 5000
