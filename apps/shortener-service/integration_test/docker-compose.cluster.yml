version: '3.8'

# Redis Cluster setup for integration testing
# This creates a 6-node Redis Cluster (3 masters + 3 replicas)
#
# Usage:
#   docker-compose -f docker-compose.cluster.yml up -d
#   docker-compose -f docker-compose.cluster.yml down
#

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-cluster-node-1
    command: redis-server --port 7000 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7000:7000"
    volumes:
      - redis-cluster-data-1:/data
    networks:
      - redis-cluster-net

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-cluster-node-2
    command: redis-server --port 7001 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7001:7001"
    volumes:
      - redis-cluster-data-2:/data
    networks:
      - redis-cluster-net

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-cluster-node-3
    command: redis-server --port 7002 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7002:7002"
    volumes:
      - redis-cluster-data-3:/data
    networks:
      - redis-cluster-net

  redis-node-4:
    image: redis:7-alpine
    container_name: redis-cluster-node-4
    command: redis-server --port 7003 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7003:7003"
    volumes:
      - redis-cluster-data-4:/data
    networks:
      - redis-cluster-net

  redis-node-5:
    image: redis:7-alpine
    container_name: redis-cluster-node-5
    command: redis-server --port 7004 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7004:7004"
    volumes:
      - redis-cluster-data-5:/data
    networks:
      - redis-cluster-net

  redis-node-6:
    image: redis:7-alpine
    container_name: redis-cluster-node-6
    command: redis-server --port 7005 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "7005:7005"
    volumes:
      - redis-cluster-data-6:/data
    networks:
      - redis-cluster-net

  # Cluster initialization container
  # This creates the cluster after all nodes are up
  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    command: >
      sh -c "
        sleep 5 &&
        redis-cli --cluster create
        redis-node-1:7000
        redis-node-2:7001
        redis-node-3:7002
        redis-node-4:7003
        redis-node-5:7004
        redis-node-6:7005
        --cluster-replicas 1
        --cluster-yes
      "
    networks:
      - redis-cluster-net

volumes:
  redis-cluster-data-1:
  redis-cluster-data-2:
  redis-cluster-data-3:
  redis-cluster-data-4:
  redis-cluster-data-5:
  redis-cluster-data-6:

networks:
  redis-cluster-net:
    driver: bridge
