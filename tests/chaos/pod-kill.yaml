# Kafka Pod 故障测试
# 验证需求: 9.2.3
# 测试场景: 杀死 Kafka Pod，验证消息队列故障转移

apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kafka-pod-kill
  namespace: default
  annotations:
    description: "杀死 Kafka Pod，验证消息队列故障转移"
