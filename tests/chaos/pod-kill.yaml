---
# 多组件同时故障测试
# 验证需求: 9.2.3
# 测试场景: 同时杀死多个组件，验证系统整体容错能力

apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: multi-component-failure
  namespace: default
  annotations:
    description: "同时杀死多个组件，验证系统整体容错能力"
spec:
  # Pod 杀死动作
  action: pod-kill
  
  # 应用到固定数量的 Pod
  mode: fixed
  value: "2"
  
  # 选择 Region A 的所有服务
  selector:
    namespaces:
      - im-region-a
    labelSelectors:
      tier: backend
  
  # 持续时间: 不设置，手动恢复
  # duration: ""
