  namespace: default
  annotations:
    description: "杀死 MySQL Pod，验证数据库故障转移"
spec:
  # Pod 杀死动作
  action: pod-kill
  
  # 应用到一个随机 Pod
  mode: one
  
  # 选择 MySQL 服务
  selector:
    namespaces:
      - im-region-a
    labelSelectors:
      app: mysql
  
  # 调度器配置: 每 30 分钟杀死一个 Pod
  scheduler:
    cron: "@every 30m"

